    <div id="aboutcompany" class="flex">
        <p>
            私共は社長が実際に訪れた国のみをご紹介するちょっと変わった旅行会社です。
            <br>対象国は現在20か国（2025年10月現在）
            <br>今後も増える予定です。
            <br>
            <br>うわべだけのただの旅行ではなく、
            <br>現地をしっかり堪能できる濃厚な時間をご提供いたします。
        </p>
